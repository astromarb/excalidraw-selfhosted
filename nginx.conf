server {
    listen 80;

    # Browsers try plain HTTP first on a bare hostname, and this port-80
    # listener is reachable over the tailnet, so bounce ts.net requests to
    # HTTPS. Requests proxied by tailscale serve carry
    # X-Forwarded-Proto: https and must not be bounced again; host-local
    # testing (Host: localhost:8080) is unaffected.
    set $redirect_https 0;
    if ($host ~* "\.ts\.net$") {
        set $redirect_https 1;
    }
    if ($http_x_forwarded_proto = "https") {
        set $redirect_https 0;
    }
    if ($redirect_https) {
        return 301 https://$host$request_uri;
    }

    # Scenes/files can carry pasted images; default 1m is too small.
    client_max_body_size 50m;

    # Excalidraw app
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Live-collaboration websocket relay (socket.io)
    location /socket.io/ {
        proxy_pass http://room:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Storage backend (scenes, rooms, files)
    location /api/v2/ {
        proxy_pass http://storage:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
