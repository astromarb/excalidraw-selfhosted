server {
    listen 80;

    # TLS is terminated upstream (Caddy); absolute redirects would emit
    # http:// URLs and downgrade the scheme.
    absolute_redirect off;

    # Scenes/files can carry pasted images; default 1m is too small.
    client_max_body_size 50m;

    # Excalidraw app
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Live-collaboration websocket relay (socket.io)
    location /socket.io/ {
        proxy_pass http://room:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Storage backend (scenes, rooms, files)
    location /api/v2/ {
        proxy_pass http://storage:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Boards dashboard (named/grouped persistent whiteboards)
    location = /boards { return 301 /boards/; }
    location /boards/ {
        proxy_pass http://boards:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
