services:
  # App-level Tailscale node. The persisted identity keeps the application
  # isolated from the Docker host and gives the stack a stable private IP.
  tailscale:
    image: tailscale/tailscale:latest
    hostname: ${TS_HOSTNAME:-excalidraw}
    restart: unless-stopped
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SOCKET=/var/run/tailscale/tailscaled.sock
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_USERSPACE=false
      - TS_EXTRA_ARGS=${TS_EXTRA_ARGS:-}
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./tailscale-serve.json:/config/serve.json:ro
      - tailscale-socket:/var/run/tailscale
    ports:
      - "${GATEWAY_PORT:-8080}:80"   # plain-HTTP access from the host for local testing

  # Caddy terminates TLS for both the custom hostname and the legacy ts.net
  # hostname. It shares the sidecar namespace, so only the Tailscale node owns
  # ports 53/443 and the Docker host remains unexposed.
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    restart: unless-stopped
    network_mode: service:tailscale
    environment:
      - PUBLIC_ORIGIN=${PUBLIC_ORIGIN}
      - LEGACY_ORIGIN=${LEGACY_ORIGIN}
      - ACME_CA=${ACME_CA}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${ACMEDNS_CONFIG_FILE:-./secrets/acmedns.json}:/run/secrets/acmedns.json:ro
      - tailscale-socket:/var/run/tailscale
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - tailscale
      - gateway

  # Split-DNS resolver for the single private application hostname.
  coredns:
    image: coredns/coredns:1.12.1
    restart: unless-stopped
    network_mode: service:tailscale
    command: -conf /etc/coredns/Corefile
    environment:
      - TS_IPV4=${TS_IPV4}
      - TS_IPV6=${TS_IPV6}
    volumes:
      - ./Corefile:/etc/coredns/Corefile:ro
    depends_on:
      - tailscale

  # Internal HTTP gateway for the whole stack.
  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    network_mode: service:tailscale
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - tailscale
      - frontend
      - room
      - storage
      - boards

  # Excalidraw frontend with the HTTP-storage patch (Firebase swapped out).
  # alswl's fork tracks upstream releases; the env vars below are substituted
  # into the built bundle at container start.
  frontend:
    image: alswl/excalidraw:v0.18.1-fork-b2
    restart: unless-stopped
    environment:
      - VITE_APP_BACKEND_V2_GET_URL=${PUBLIC_ORIGIN}/api/v2/scenes/
      - VITE_APP_BACKEND_V2_POST_URL=${PUBLIC_ORIGIN}/api/v2/scenes/
      - VITE_APP_WS_SERVER_URL=${PUBLIC_ORIGIN}
      - VITE_APP_STORAGE_BACKEND=http
      - VITE_APP_HTTP_STORAGE_BACKEND_URL=${PUBLIC_ORIGIN}/api/v2
      - VITE_APP_FIREBASE_CONFIG={}
      - VITE_APP_LIBRARY_URL=https://libraries.excalidraw.com
      - VITE_APP_LIBRARY_BACKEND=https://us-central1-excalidraw-room-persistence.cloudfunctions.net/libraries
      - VITE_APP_DISABLE_TRACKING=yes

  # Official websocket relay for live collaboration (socket.io).
  room:
    image: excalidraw/excalidraw-room:latest
    restart: unless-stopped

  # Persists shared scenes, shareable links, and pasted images into Redis.
  storage:
    image: alswl/excalidraw-storage-backend:v2023.11.11
    restart: unless-stopped
    environment:
      - PORT=8080
      - GLOBAL_PREFIX=/api/v2
      - STORAGE_URI=redis://redis:6379

  # Boards dashboard: named, grouped, persistent shared whiteboards at
  # /boards. Metadata (names, groups, room links) lives in boards-data;
  # board content rides the normal room/storage pipeline.
  boards:
    build: ./boards
    restart: unless-stopped
    volumes:
      - boards-data:/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

volumes:
  redis-data:
  boards-data:
  tailscale-state:
  tailscale-socket:
  caddy-data:
  caddy-config:
