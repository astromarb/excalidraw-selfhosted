<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Private Excalidraw Workspace</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f7f5ff;
        color: #211a3a;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }

      main {
        width: min(560px, 100%);
        padding: 40px;
        border: 1px solid #ded7f7;
        border-radius: 24px;
        background: #ffffff;
        box-shadow: 0 24px 70px rgb(67 45 130 / 12%);
      }

      .mark {
        width: 48px;
        height: 48px;
        display: grid;
        place-items: center;
        border-radius: 14px;
        background: #6965db;
        color: white;
        font-size: 26px;
        font-weight: 700;
      }

      h1 {
        margin: 24px 0 12px;
        font-size: clamp(2rem, 7vw, 3rem);
        line-height: 1.05;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        color: #625a78;
        font-size: 1.05rem;
        line-height: 1.65;
      }

      .status {
        margin-top: 28px;
        padding: 16px 18px;
        border-radius: 14px;
        background: #f1effb;
        color: #41386a;
        font-size: 0.95rem;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #15121e;
          color: #f5f2ff;
        }

        main {
          border-color: #38304f;
          background: #211c2d;
          box-shadow: none;
        }

        p {
          color: #c0b8d4;
        }

        .status {
          background: #302943;
          color: #ddd5f5;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">E</div>
      <h1>Private Excalidraw workspace</h1>
      <p>
        This workspace is available only to authorized members of Marvin's
        Tailscale network. Connect Tailscale, then reload this page.
      </p>
      <div class="status">The application is not exposed to the public internet.</div>
    </main>
  </body>
</html>
