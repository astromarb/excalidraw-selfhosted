# Build the frontend from source instead of using the prebuilt image.
#
# Either run ad hoc:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
# or make it permanent by adding to .env:
#   COMPOSE_FILE=docker-compose.yml:docker-compose.build.yml
#
# Defaults point at astromarb/excalidraw@selfhost — the fork carrying the
# self-host patch as commits. Seed it first if the selfhost branch doesn't
# exist yet:
#   scripts/seed-fork.sh
#
# To temporarily fall back to upstream + vendored patch instead:
#   EXCALIDRAW_REPO=https://github.com/excalidraw/excalidraw.git
#   EXCALIDRAW_REF=v0.18.1
services:
  frontend:
    image: excalidraw-frontend:selfhost
    build:
      context: ./frontend
      args:
        EXCALIDRAW_REPO: ${EXCALIDRAW_REPO:-https://github.com/astromarb/excalidraw.git}
        EXCALIDRAW_REF: ${EXCALIDRAW_REF:-selfhost}
