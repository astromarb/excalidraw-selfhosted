# Build the frontend from source instead of using the prebuilt image.
#
# Either run ad hoc:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
# or make it permanent by adding to .env:
#   COMPOSE_FILE=docker-compose.yml:docker-compose.build.yml
#
# By default this builds upstream excalidraw/excalidraw at a pinned tag with
# frontend/excalidraw-selfhost.patch applied. Once you have your own fork
# carrying the patch (plus your customizations) as commits, point the args at
# it in .env:
#   EXCALIDRAW_REPO=https://github.com/astromarb/excalidraw.git
#   EXCALIDRAW_REF=selfhost
services:
  frontend:
    image: excalidraw-frontend:selfhost
    build:
      context: ./frontend
      args:
        EXCALIDRAW_REPO: ${EXCALIDRAW_REPO:-https://github.com/excalidraw/excalidraw.git}
        EXCALIDRAW_REF: ${EXCALIDRAW_REF:-v0.18.1}
